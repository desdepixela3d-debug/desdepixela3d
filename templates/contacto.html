<!DOCTYPE html>
<html lang="es">

  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/css/style.css">
    <title>Desde Pixel a 3D — Contacto</title>
  </head>

  <body>

    <nav>
      <a href="index.html">Galería</a>
      <a href="about.html">Quiénes somos</a>
      <a href="contacto.html" class="activo">Contacto</a>
    </nav>

    <header>
      <h1>Desde Pixel a 3D</h1>
      <p>Impresión 3D personalizada desde tus fotos</p>
    </header>

    <section class="contacto">
      <h2>Contactanos</h2>
      <p>Completá el formulario y te respondemos a la brevedad.</p>

      <div class="formulario">

        <div class="campo">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Tu nombre completo">
        </div>

        <div class="campo">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Tu email">
        </div>

        <div class="campo">
          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" rows="5" placeholder="Contanos qué necesitás"></textarea>
        </div>

        <button id="btnEnviar">Enviar mensaje</button>

        <p id="confirmacion" style="display:none;">
          ✅ ¡Mensaje enviado! Te respondemos pronto.
        </p>

      </div>
    </section>

    <script src="/static/js/contacto.js"></script>

  </body>

</html>
