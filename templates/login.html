<!DOCTYPE html>
<html lang="es">

  <head>
    <meta charset="UTF-8">
    <title>Administrador — Desde Pixel a 3D</title>
    <style>
      body {
        background-color: #412402;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .caja {
        background-color: #633806;
        padding: 40px;
        border-radius: 12px;
        text-align: center;
        width: 320px;
      }
      h1 {
        color: #FAC775;
        font-size: 22px;
        margin-bottom: 30px;
      }
      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 16px;
        border-radius: 6px;
        border: none;
        background-color: #FAEEDA;
        color: #412402;
        font-size: 15px;
        box-sizing: border-box;
      }
      button {
        background-color: #EF9F27;
        color: #412402;
        border: none;
        padding: 12px 30px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
      }
      button:hover {
        background-color: #FAC775;
      }
      .error {
        color: #FAC775;
        margin-top: 16px;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="caja">
      <h1>Panel de Administración</h1>
      <input type="text" id="usuario" placeholder="Usuario">
      <input type="password" id="password" placeholder="Contraseña">
      <button id="btnLogin">Ingresar</button>
      <p class="error" id="error" style="display:none;">
        Usuario o contraseña incorrectos.
      </p>
    </div>
    <script>
      document.getElementById('btnLogin').addEventListener('click', function() {
        let usuario = document.getElementById('usuario').value.trim();
        let password = document.getElementById('password').value.trim();

        if (usuario === '' || password === '') {
          document.getElementById('error').style.display = 'block';
          document.getElementById('error').textContent = 'Por favor completá todos los campos.';
          return;
        }

        fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario: usuario, password: password })
        })
        .then(function(response) { return response.json(); })
        .then(function(data) {
          if (data.ok) {
            window.location.href = '/admin';
          } else {
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = 'Usuario o contraseña incorrectos.';
          }
        });
      });
    </script>
  </body>

</html>
